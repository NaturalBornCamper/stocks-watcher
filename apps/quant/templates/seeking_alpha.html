{% extends 'base.html' %}

{% block head_css %}
    <style>
        table, th, td {
            border: 1px solid black;
        }

        th {
            cursor: pointer;
        }

        /* Gating row colours -- only set by the all-time score view (sa/score). */
        /* RED    = stock missing from BOTH this month's and last month's SA ratings (gone 2+ months) */
        /* ORANGE = stock missing from this month's SA ratings (just dropped out)                     */
        /* YELLOW = stock back in this month's SA ratings after being out last month                  */
        tr.gated-red    td { background: #ffcccc; }
        tr.gated-orange td { background: #ffe0b3; }
        tr.gated-yellow td { background: #fff9c4; }
    </style>
{% endblock %}

{% block content %}
    {% block sa_ratings_menu %}
        {% include "_sa_ratings_menu.html" %}
    {% endblock sa_ratings_menu %}

    {% block sa_content %}
        <!-- Page-specific content -- override `sa_content` (not `content`) in child templates -->
    {% endblock sa_content %}
{% endblock content %}

{% block footer_js %}
    <script>
        const getCellValue = (tr, idx) => tr.children[idx].dataset.sort;

        const comparer = (idx, asc) => {
            const getCellValue = (tr, idx) => tr.children[idx].dataset.sort;
            const compareValues = (v1, v2) => {
                if (v1 === '' || v2 === '' || isNaN(v1) || isNaN(v2)) {
                    return v1.toString().localeCompare(v2);
                }
                return v1 - v2;
            };
            return (a, b) => {
                const valueA = getCellValue(asc ? a : b, idx);
                const valueB = getCellValue(asc ? b : a, idx);
                return compareValues(valueA, valueB);
            };
        };

        document.querySelectorAll('th').forEach(th => th.addEventListener('click', (() => {
            const table = th.closest('table').querySelector('tbody');
            Array.from(table.querySelectorAll('tr:nth-child(n+2)'))
                .sort(comparer(Array.from(th.parentNode.children).indexOf(th), this.asc = !this.asc))
                .forEach(tr => table.appendChild(tr));
        })));
    </script>
{% endblock %}
